        product_code:  String(r['상품코드']||'').trim(),
        product_name:  String(r['상품명']||'').trim(),
        product_url:   String(r['상품URL']||r['url']||'').trim(),
        price:         Number(r['판매가']||0)||0,
        shipping_method: String(r['배송방법']||'').includes('직배')?'직배송':'택배',
        shipping_cond: (()=>{const c=String(r['배송비 구분']||'');return c==='T'?'00원 이상 무료':c==='R'?'수량 비례':'기본';})(),
        shipping_fee:  Number(r['배송비입력']||0)||0,
        cs_info:       String(r['CS 정보 ']||r['CS정보']||r['CS 정보']||'').trim(),
        memo:          String(r['메모']||'').trim(),
        options:       parseOptions(String(r['옵션입력']||'')),
        updated_at:    new Date().toISOString(),
      })).filter(r=>r.product_name);
      const codes=records.map(r=>r.product_code).filter(Boolean);
      const{data:existingList}=await sb.from('products').select('product_code,product_name').in('product_code',codes);
      const dupList=existingList||[];
      if(dupList.length>0){
        setDupInfo({records,dupList});
        setUploading(false); return;
      }
      const{error}=await sb.from('products').upsert(records,{onConflict:'product_code'});
      if(error) throw new Error(error.message);
      setUploadMsg('✅ '+records.length+'개 상품 업로드 완료'); load();
    }catch(err){setUploadMsg('❌ 오류: '+err.message);}
    setUploading(false); e.target.value='';
  };
  const confirmUpload=async()=>{
    if(!dupInfo)return; setUploading(true); setUploadMsg('');
    try{
      const{error}=await sb.from('products').upsert(dupInfo.records,{onConflict:'product_code'});
      if(error) throw new Error(error.message);
      setUploadMsg('✅ '+dupInfo.records.length+'개 상품 업로드 완료'); load();
    }catch(err){setUploadMsg('❌ 오류: '+err.message);}
    setDupInfo(null); setUploading(false);
    if(fileRef.current) fileRef.current.value='';
  };
  const cancelUpload=()=>{
    setDupInfo(null); setUploadMsg('업로드를 취소했습니다. 기존 데이터가 유지됩니다.');
    if(fileRef.current) fileRef.current.value='';
  };

  const downloadTemplate=()=>{
    const wb=XLSX.utils.book_new();
    const data=[
      ['공급사명','상품코드','상품명','배송방법','배송비 구분','배송비입력','옵션입력','CS정보','메모'],
      ['홍길동상사','SKU-001','순면 이불','택배','T','3000','색상{화이트|차콜}//사이즈{S|M}','1. 반품 배송비\n2. 교환/반품 가능 기간\n3. 교환/반품 조건\n4. AS 연락처',''],
    ];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),'상품정보');
    XLSX.writeFile(wb,'상품_정보_등록_양식.xlsx');
  };

  const requiredFields=[
    {k:'supplier_name',label:'공급사명'},
    {k:'product_code',  label:'상품 코드'},
    {k:'product_name',  label:'상품명'},
    {k:'product_url',   label:'상품 URL'},
    {k:'price',         label:'판매가'},
  ];
  const missingFields=requiredFields.filter(f=>!String(form[f.k]||'').trim());
  const save=async()=>{
    if(missingFields.length>0){setMsg('필수 항목을 입력해주세요: '+missingFields.map(f=>f.label).join(', '));return;}
    setSaving(true); setMsg('');
    const basePayload={...form,price:Number(form.price)||0,shipping_fee:Number(form.shipping_fee)||0,
      shipping_threshold:Number(form.shipping_threshold)||0,options:form.options||[]};
    let error;
    if(editId){
      ({error}=await sb.from('products').update({...basePayload,updated_at:new Date().toISOString()}).eq('id',editId));
    } else {
      const{data:existing}=await sb.from('products').select('id,product_name').eq('product_code',form.product_code.trim()).maybeSingle();
      if(existing){
        setSaving(false);
        const choice=window.confirm('이미 등록된 상품 코드입니다.\n\n상품명: '+existing.product_name+'\n코드: '+form.product_code+'\n\n[확인] 기존 정보를 덮어쓰기\n[취소] 등록하지 않음');
        if(!choice){setMsg('등록을 취소했습니다. 상품 코드를 확인해주세요.');return;}
        setSaving(true);
        ({error}=await sb.from('products').update({...basePayload,updated_at:new Date().toISOString()}).eq('id',existing.id));
      } else {
        const{updated_at:_,...insertPayload}=basePayload;
        ({error}=await sb.from('products').insert(insertPayload));
      }
    }
    setSaving(false);
    if(error){setMsg('저장 실패: '+error.message);return;}
    setMsg('저장되었습니다!'); setForm({...EMPTY_PRODUCT}); setEditId(null);
    load(); setTimeout(()=>setTab('list'),600);
  };

  const startEdit=p=>{
    setForm({...EMPTY_PRODUCT,...p,options:p.options||[],
      price:p.price||'',shipping_fee:p.shipping_fee||'',shipping_threshold:p.shipping_threshold||''});
    setEditId(p.id); setDetailProd(null); setTab('add'); setMsg('');
  };
  const bulkDelete=async()=>{
    if(!confirm(checkedIds.size+'개 상품을 삭제하시겠습니까?'))return;
    const ids=[...checkedIds];
    await Promise.all(ids.map(id=>sb.from('products').delete().eq('id',id)));
    setCheckedIds(new Set()); load();
  };
  const del=async id=>{
    if(!confirm('삭제하시겠습니까?'))return;
    await sb.from('products').delete().eq('id',id); load();
  };

  const filtered=products.filter(p=>{
    if(!search) return true;
    const q=search.toLowerCase();
    if(searchField==='supplier') return (p.supplier_name||'').toLowerCase().includes(q);
    if(searchField==='product')  return (p.product_name||'').toLowerCase().includes(q);
    if(searchField==='code')     return (p.product_code||'').toLowerCase().includes(q);
    if(searchField==='url')      return (p.product_url||'').toLowerCase().includes(q);
    return ((p.supplier_name||'')+(p.product_name||'')+(p.product_code||'')+(p.product_url||'')+(p.cs_info||'')).toLowerCase().includes(q);
  });

  const TabBtn=({id,label})=>(
    <button onClick={()=>{setTab(id);setMsg('');setCheckedIds(new Set());}} style={{padding:'8px 18px',borderRadius:8,border:'none',fontFamily:'inherit',fontWeight:600,fontSize:13,cursor:'pointer',
      background:tab===id?'var(--primary)':'var(--card)',color:tab===id?'#fff':'var(--sub)',transition:'all .15s'}}>{label}</button>
  );

  const inputStyle={width:'100%',padding:'10px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:14,fontFamily:'inherit',outline:'none'};
  const taStyle={...inputStyle,resize:'vertical'};

  return (
    <div>
      <div className="page-header"><div><div className="page-title">상품 정보</div><div className="page-sub">공급사별 상품 정보 저장 및 검색</div></div></div>
      <div className="section" style={{paddingBottom:0}}>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <TabBtn id="list" label="상품 목록"/>
          <TabBtn id="add"  label={editId?'상품 수정':'상품 등록'}/>
        </div>
      </div>

      {tab==='list'&&(
        <div className="section" style={{paddingTop:0}}>
          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
            <select value={searchField} onChange={e=>setSearchField(e.target.value)}
              style={{padding:'8px 12px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}>
              <option value="all">전체</option>
              <option value="supplier">공급사</option>
              <option value="product">상품명</option>
              <option value="code">상품코드</option>
              <option value="url">URL</option>
            </select>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색어 입력..."
              style={{flex:1,minWidth:200,padding:'8px 12px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}/>
            <button className="btn-filter" onClick={()=>{setForm({...EMPTY_PRODUCT});setEditId(null);setTab('add');}}>+ 상품 등록</button>
          </div>
          <div className="chart-card">
            {loading?<div className="loading">불러오는 중...</div>:filtered.length===0?<div className="empty-state">등록된 상품이 없습니다</div>:
            <div className="table-wrap">
              <table className="hist">
                <thead><tr>
                  <th style={{width:36,textAlign:'center'}}>
                    <input type="checkbox" checked={filtered.length>0&&filtered.every(p=>checkedIds.has(p.id))}
                      onChange={e=>{ if(e.target.checked) setCheckedIds(new Set(filtered.map(p=>p.id))); else setCheckedIds(new Set()); }}
                      style={{cursor:'pointer',width:14,height:14}}/>
                  </th>
                  <th>공급사</th><th>코드</th><th>상품명</th><th>판매가</th><th>배송</th><th>CS 정보</th><th>URL</th><th>등록/수정 날짜</th><th>관리</th>
                </tr></thead>
                <tbody>{filtered.map(p=>(
                  <tr key={p.id} style={{background:checkedIds.has(p.id)?'rgba(248,113,113,.05)':''}}>
                    <td style={{textAlign:'center'}}>
                      <input type="checkbox" checked={checkedIds.has(p.id)}
                        onChange={e=>{ const s=new Set(checkedIds); e.target.checked?s.add(p.id):s.delete(p.id); setCheckedIds(s); }}
                        style={{cursor:'pointer',width:14,height:14}}/>
                    </td>
                    <td><span className="agent-badge">{p.supplier_name||'-'}</span></td>
                    <td style={{fontSize:11,color:'var(--sub)'}}>{p.product_code||'-'}</td>
                    <td style={{cursor:'pointer',color:'var(--accent)',textDecoration:'underline',textDecorationStyle:'dotted'}} onClick={()=>setDetailProd(p)}>{p.product_name}</td>
                    <td style={{cursor:'pointer',color:'var(--accent)',textDecoration:'underline',textDecorationStyle:'dotted'}} onClick={()=>setDetailProd(p)}>{p.price?Number(p.price).toLocaleString()+'원':'-'}</td>
                    <td style={{cursor:'pointer',color:'var(--accent)',textDecoration:'underline',textDecorationStyle:'dotted',fontSize:12}} onClick={()=>setDetailProd(p)}>
                      {p.shipping_method||'-'}<br/>
                      <span style={{color:'var(--sub)'}}>{p.shipping_cond==='수량별 차등'?'수량별 차등':(p.shipping_cond||'')}</span>
                    </td>
                    <td style={{cursor:'pointer',color:'var(--accent)',textDecoration:'underline',textDecorationStyle:'dotted',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}} onClick={()=>setDetailProd(p)}>{p.cs_info||'-'}</td>
                    <td>{p.product_url?<a href={p.product_url} target="_blank" rel="noreferrer" style={{color:'var(--accent)',fontSize:12}}>링크</a>:'-'}</td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:2}}>
                        <span style={{fontSize:11}}>{p.created_at?p.created_at.slice(0,10):'-'}</span>
                        {p.updated_at&&<span style={{fontSize:10,color:'var(--sub)'}}>수정 {p.updated_at.slice(0,10)}</span>}
                      </div>
                    </td>
                    <td>
                      <button className="btn-edit" onClick={()=>startEdit(p)}>수정</button>
                      <button className="btn-delete" onClick={()=>del(p.id)}>삭제</button>
                    </td>
                  </tr>
                ))}</tbody>
              </table>
            </div>}
          </div>
        </div>
      )}

      {tab==='add'&&(
        <div className="section" style={{paddingTop:0}}>
          <div className="entry-card">
            {/* 엑셀 일괄 업로드 */}
            <div className="entry-section-title">엑셀 일괄 업로드</div>
            <div style={{display:'flex',gap:12,alignItems:'center',padding:'16px',background:'var(--bg)',border:'1px dashed var(--border)',borderRadius:10,marginBottom:8,flexWrap:'wrap'}}>
              <div style={{flex:1,fontSize:12,color:'var(--sub)',lineHeight:1.7}}>
                카페24 상품 엑셀 파일 업로드 (공급사명·상품코드·상품명·배송비·옵션 자동 파싱)<br/>
                <span style={{fontSize:11}}>옵션 형식: <code style={{background:'var(--surface)',padding:'1px 5px',borderRadius:4}}>색상{'{화이트|차콜}'}//사이즈{'{S|M|L}'}</code></span>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn-upload" onClick={()=>fileRef.current?.click()} disabled={uploading}>{uploading?'업로드 중...':'📂 파일 업로드'}</button>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleUpload}/>
                <button className="btn-template" onClick={downloadTemplate}>⬇ 양식 다운로드</button>
              </div>
            </div>
            {uploadMsg&&<div className={uploadMsg.startsWith('✅')?'success-msg':'error-msg'} style={{marginBottom:12}}>{uploadMsg}</div>}
            {dupInfo&&(
              <div style={{background:'#0d1628',border:'1px solid #F6AD09',borderRadius:10,padding:20,marginBottom:16}}>
                <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>중복 상품 코드 발견</div>
                <div style={{fontSize:12,color:'var(--sub)',marginBottom:12}}>
                  업로드 파일에 이미 등록된 상품 코드가 <span style={{color:'var(--yellow)',fontWeight:700}}>{dupInfo.dupList.length}개</span> 포함되어 있습니다.
                </div>
                <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',marginBottom:14,maxHeight:140,overflowY:'auto'}}>
                  {dupInfo.dupList.map((d,i)=>(
                    <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                      <span style={{fontFamily:'monospace',background:'rgba(42,71,141,.25)',color:'var(--accent)',padding:'1px 6px',borderRadius:3,fontSize:11}}>{d.product_code}</span>
                      <span style={{color:'var(--text)',flex:1}}>{d.product_name}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={confirmUpload} style={{flex:1,padding:'11px',background:'#1a4fc4',border:'1px solid #2a63e0',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>확인 — 덮어쓰기</button>
                  <button onClick={cancelUpload}  style={{flex:1,padding:'11px',background:'#a01a1a',border:'1px solid #c82020',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>취소 — 기존 유지</button>
                </div>
                <div style={{fontSize:11,color:'var(--sub)',marginTop:10,padding:'8px 10px',background:'rgba(246,173,9,.06)',border:'1px solid rgba(246,173,9,.2)',borderRadius:6,lineHeight:1.7}}>
                  확인: 중복 포함 전체 파일 내용으로 업데이트<br/>취소: 업로드를 중단하고 기존 데이터 유지
                </div>
              </div>
            )}

            {/* 상품 정보 */}
            <div className="entry-section-title">상품 정보</div>
            {msg&&<div className={msg.includes('실패')?'error-msg':'success-msg'} style={{marginBottom:12}}>{msg}</div>}
            <div className="entry-grid">
              <div className="entry-field">
                <label>공급사명<span style={{marginLeft:4,fontSize:10,background:"rgba(248,113,113,.15)",color:"var(--red)",padding:"1px 5px",borderRadius:3,fontWeight:600}}>필수</span></label>
                <input style={inputStyle} type="text" value={form.supplier_name} onChange={e=>setF('supplier_name',e.target.value)} placeholder="예: 홍길동상사"/>
              </div>
              <div className="entry-field">
                <label>상품 코드<span style={{marginLeft:4,fontSize:10,background:"rgba(248,113,113,.15)",color:"var(--red)",padding:"1px 5px",borderRadius:3,fontWeight:600}}>필수</span></label>
                <input style={inputStyle} type="text" value={form.product_code} onChange={e=>setF('product_code',e.target.value)} placeholder="예: SKU-001"/>
              </div>
              <div className="entry-field" style={{gridColumn:'1/-1'}}>
                <label>상품명<span style={{marginLeft:4,fontSize:10,background:"rgba(248,113,113,.15)",color:"var(--red)",padding:"1px 5px",borderRadius:3,fontWeight:600}}>필수</span></label>
                <input style={inputStyle} type="text" value={form.product_name} onChange={e=>setF('product_name',e.target.value)} placeholder="예: 순면 이불 세트"/>
              </div>
              <div className="entry-field" style={{gridColumn:'1/-1'}}>
                <label>상품 URL<span style={{marginLeft:4,fontSize:10,background:"rgba(248,113,113,.15)",color:"var(--red)",padding:"1px 5px",borderRadius:3,fontWeight:600}}>필수</span></label>
                <input style={inputStyle} type="text" value={form.product_url} onChange={e=>setF('product_url',e.target.value)} placeholder="https://..."/>
              </div>
              <div className="entry-field">
                <label>판매가 (원)<span style={{marginLeft:4,fontSize:10,background:"rgba(248,113,113,.15)",color:"var(--red)",padding:"1px 5px",borderRadius:3,fontWeight:600}}>필수</span></label>
                <input style={inputStyle} type="text" inputMode="numeric" value={form.price} onChange={e=>setF('price',e.target.value)} placeholder="예: 59000"/>
              </div>
            </div>

            {/* 배송 정보 */}
            <div className="entry-section-title">배송 정보</div>
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:16,display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:12,color:'var(--sub)',width:70,flexShrink:0}}>배송 방법</span>
                <div style={{display:'flex',gap:8}}>
                  {SHIP_METHODS.map(m=>(
                    <button key={m} onClick={()=>setF('shipping_method',m)}
                      style={{padding:'5px 16px',borderRadius:20,border:'1px solid',fontFamily:'inherit',fontSize:12,cursor:'pointer',
                        borderColor:form.shipping_method===m?'var(--primary)':'var(--border)',
                        background:form.shipping_method===m?'rgba(79,142,247,.15)':'transparent',
                        color:form.shipping_method===m?'var(--primary)':'var(--sub)'}}>{m}</button>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                <span style={{fontSize:12,color:'var(--sub)',width:70,flexShrink:0,paddingTop:6}}>배송비 조건</span>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {SHIP_CONDS.map(c=>(
                    <button key={c} onClick={()=>setF('shipping_cond',c)}
                      style={{padding:'4px 12px',borderRadius:20,border:'1px solid',fontFamily:'inherit',fontSize:11,cursor:'pointer',
                        borderColor:form.shipping_cond===c?'var(--primary)':'var(--border)',
                        background:form.shipping_cond===c?'rgba(79,142,247,.15)':'transparent',
                        color:form.shipping_cond===c?'var(--primary)':'var(--sub)'}}>{c}</button>
                  ))}
                </div>
              </div>
              {form.shipping_cond==='기타'&&(
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--sub)',width:70,flexShrink:0}}>기타 내용</span>
                  <input style={{...inputStyle,flex:1}} type="text" value={form.shipping_cond_text} onChange={e=>setF('shipping_cond_text',e.target.value)} placeholder="배송비 조건 직접 입력"/>
                </div>
              )}
              {form.shipping_cond==='00원 이상 무료'&&(
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--sub)',width:70,flexShrink:0}}>기준 금액</span>
                  <input style={{...inputStyle,width:120}} type="text" inputMode="numeric" value={form.shipping_threshold} onChange={e=>setF('shipping_threshold',e.target.value)} placeholder="예: 50000"/>
                  <span style={{fontSize:12,color:'var(--sub)'}}>원 이상 무료</span>
                </div>
              )}
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:12,color:'var(--sub)',width:70,flexShrink:0}}>배송비</span>
                <input style={{...inputStyle,width:120}} type="text" inputMode="numeric" value={form.shipping_fee} onChange={e=>setF('shipping_fee',e.target.value)} placeholder="예: 3000"/>
                <span style={{fontSize:12,color:'var(--sub)'}}>원 (0이면 무료)</span>
              </div>
            </div>

            {/* 옵션 */}
            <div className="entry-section-title">옵션 구성</div>
            {(form.options||[]).map((opt,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'8px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,marginBottom:6}}>
                <input style={{...inputStyle,width:100,padding:'6px 10px',fontSize:13}} type="text" value={opt.name} onChange={e=>setOptName(i,e.target.value)} placeholder="옵션명"/>
                <input style={{...inputStyle,flex:1,padding:'6px 10px',fontSize:13}} type="text" value={opt.values.join('|')} onChange={e=>setOptVals(i,e.target.value)} placeholder="값1|값2|값3"/>
                <button className="btn-remove" onClick={()=>removeOption(i)}>삭제</button>
              </div>
            ))}
            <button className="btn-add-agent" onClick={addOption}>+ 옵션 추가</button>

            {/* CS / 메모 */}
            <div className="entry-section-title">CS 정보</div>
            <div className="entry-field" style={{marginBottom:14}}>
              <label>CS 정보 (반품/교환/AS 등)</label>
              <textarea style={{...taStyle,minHeight:90}} value={form.cs_info} onChange={e=>setF('cs_info',e.target.value)}
                placeholder={'1. 반품 배송비\n2. 교환/반품 가능 기간\n3. 교환/반품 조건\n4. AS 연락처 등'}/>
            </div>
            <div className="entry-field">
              <label>메모</label>
              <textarea style={{...taStyle,minHeight:60}} value={form.memo} onChange={e=>setF('memo',e.target.value)} placeholder="기타 메모"/>
            </div>

            <div className="entry-actions">
              <button className="btn-save" onClick={save} disabled={saving||missingFields.length>0}
                style={{opacity:missingFields.length>0?.4:1,cursor:missingFields.length>0?'not-allowed':'pointer'}}>
                {saving?'저장 중...':'저장'}
              </button>
              {missingFields.length>0&&<span style={{fontSize:12,color:'var(--red)'}}>필수 항목 미입력: {missingFields.map(f=>f.label).join(', ')}</span>}
              {editId&&<button className="btn-cancel" onClick={()=>{setForm({...EMPTY_PRODUCT});setEditId(null);setTab('list');}}>취소</button>}
            </div>
          </div>
        </div>
      )}

      {/* 상품 상세 뷰 */}
      {detailProd&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={e=>{if(e.target===e.currentTarget)setDetailProd(null);}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:28,width:'90%',maxWidth:520,maxHeight:'80vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
              <div style={{fontSize:17,fontWeight:700}}>{detailProd.product_name}</div>
              <button onClick={()=>setDetailProd(null)} style={{background:'none',border:'none',color:'var(--sub)',fontSize:20,cursor:'pointer',lineHeight:1}}>✕</button>
            </div>
            {[
              ['공급사',   <span className="agent-badge">{detailProd.supplier_name||'-'}</span>],
              ['상품코드', detailProd.product_code||'-'],
              ['판매가',   detailProd.price?Number(detailProd.price).toLocaleString()+'원':'-'],
              ['배송방법', detailProd.shipping_method||'-'],
              ['배송비 조건', detailProd.shipping_cond==='기타'?detailProd.shipping_cond_text:detailProd.shipping_cond||'-'],
              ['배송비', detailProd.shipping_cond==='수량별 차등'
          ? <div style={{fontSize:12}}>{parseTieredShipping(detailProd.shipping_cond_text).map((t,i)=>(
              <div key={i} style={{padding:'2px 0',color:'var(--sub)'}}>{t.from}개 이상 ~ {t.to}개 미만: <span style={{color:'var(--text)'}}>{Number(t.fee).toLocaleString()}원</span></div>
            ))}</div>
          : (detailProd.shipping_fee?Number(detailProd.shipping_fee).toLocaleString()+'원':'무료')],
              ['URL',      detailProd.product_url?<a href={detailProd.product_url} target="_blank" rel="noreferrer" style={{color:'var(--primary)'}}>링크 열기</a>:'-'],
            ].map(([label,val])=>(
              <div key={label} style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>
                <span style={{fontSize:11,color:'var(--sub)',width:72,flexShrink:0,paddingTop:2,textTransform:'uppercase',letterSpacing:'.04em'}}>{label}</span>
                <span style={{fontSize:13,color:'var(--text)',flex:1}}>{val}</span>
              </div>
            ))}
            {(detailProd.options||[]).length>0&&(
              <div style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>
                <span style={{fontSize:11,color:'var(--sub)',width:72,flexShrink:0,paddingTop:2,textTransform:'uppercase',letterSpacing:'.04em'}}>옵션</span>
                <div style={{flex:1}}>
                  {(detailProd.options||[]).map((opt,i)=>(
                    <div key={i} style={{marginBottom:8}}>
                      <div style={{fontSize:11,color:'var(--sub)',marginBottom:4}}>{opt.name}</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        {(opt.values||[]).map((v,j)=>(
                          <span key={j} style={{padding:'2px 9px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:20,fontSize:11,color:'var(--sub)'}}>{v}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {detailProd.cs_info&&(
              <div style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>
                <span style={{fontSize:11,color:'var(--sub)',width:72,flexShrink:0,paddingTop:2,textTransform:'uppercase',letterSpacing:'.04em'}}>CS 정보</span>
                <span style={{fontSize:12,color:'var(--sub)',flex:1,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{detailProd.cs_info}</span>
              </div>
            )}
            <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:10}}>
              <button className="btn-cancel" onClick={()=>setDetailProd(null)}>닫기</button>
              <button className="btn-save" onClick={()=>startEdit(detailProd)}>수정</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── HISTORY (legacy - unused) ──────────────────
function HistoryPage({ onEdit }) {
  const [opsMap,setOpsMap]=useState({}); const [agents,setAgents]=useState([]); const [allDates,setAllDates]=useState([]); const [loading,setLoading]=useState(true);
  const load=async()=>{
    setLoading(true);
    const[r1,r2]=await Promise.all([sb.from('daily_ops').select('*'),sb.from('agent_daily_ops').select('*')]);
    const ops=r1.data||[]; const ag=r2.data||[];
    const map={}; ops.forEach(r=>{map[r.date]=r;});
    const dates=[...new Set([...ops.map(r=>r.date),...ag.map(r=>r.date)])].sort().reverse();
    setOpsMap(map); setAgents(ag); setAllDates(dates); setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const del=async date=>{ if(!confirm(`${date} 데이터를 삭제하시겠습니까?`))return; await Promise.all([sb.from('daily_ops').delete().eq('date',date),sb.from('agent_daily_ops').delete().eq('date',date)]); load(); };
  return (
    <div>
      <div className="page-header"><div><div className="page-title">데이터 내역</div><div className="page-sub">입력된 운영 데이터 목록</div></div></div>
      <div className="section">
        <div className="chart-card">
          {loading?<div className="loading">불러오는 중...</div>:allDates.length===0?<div className="empty-state">입력된 데이터가 없습니다</div>:
          <div className="table-wrap">
            <table className="hist">
              <thead><tr><th>날짜</th><th>응대율</th><th>인입호</th><th>요청호</th><th>응대호(유선)</th><th>상담원</th><th>응대호 합계</th><th>관리</th></tr></thead>
              <tbody>{allDates.map(date=>{ const r=opsMap[date]||{}; const da=agents.filter(a=>a.date===date); const tot=da.reduce((s,a)=>s+(Number(a.answered_calls)||0),0); return (
                <tr key={date}>
                  <td>{date}</td>
                  <td>{r.response_rate!=null?<span className={`badge ${Number(r.response_rate)>=90?'badge-green':'badge-red'}`}>{fmtPct(r.response_rate)}</span>:<span style={{color:'var(--sub)',fontSize:11}}>-</span>}</td>
                  <td>{r.inbound_calls??'-'}</td><td>{r.request_calls??'-'}</td><td>{r.answered_calls??'-'}</td>
                  <td>{da.map(a=><span key={a.id} className="agent-badge">{a.agent_name}</span>)}</td>
                  <td>{tot||'-'}</td>
                  <td><button className="btn-edit" onClick={()=>onEdit(date)}>수정</button><button className="btn-delete" onClick={()=>del(date)}>삭제</button></td>
                </tr>
              );})}</tbody>
            </table>
          </div>}
        </div>
      </div>
    </div>
  );
}
